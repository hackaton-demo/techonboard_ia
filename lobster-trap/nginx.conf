server {
    listen 80;

    # Health check
    location /health {
        return 200 '{"status":"ok","service":"lobster-trap-proxy"}';
        add_header Content-Type application/json;
    }

    # Proxy a Gemini API
    location / {
        proxy_pass https://generativelanguage.googleapis.com;
        proxy_ssl_server_name on;
        proxy_set_header Host generativelanguage.googleapis.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Lobster Trap audit headers
        add_header X-Lobster-Trap-Status "PASS";
        add_header X-Lobster-Trap-Version "1.0-placeholder";
        add_header X-Lobster-Trap-Policy "default";

        # Timeouts para requests de IA (pueden ser lentos)
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;

        # Buffer settings
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
